name: PositronicOps Python CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Extraer código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar linter (Flake8)
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Revisar sintaxis con flake8
      run: |
        # Detiene la ejecución si hay errores críticos de sintaxis
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Muestra advertencias de formato sin detener la ejecución
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
